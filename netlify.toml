# Netlify deployment config for the Vite + React app.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: let React Router handle client-side routes so a hard refresh
# on e.g. /vocabulary doesn't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_ANTHROPIC_API_KEY in the Netlify dashboard:
#   Site settings → Build & deploy → Environment → Environment variables
# (It is read at build time and inlined into the client bundle.)
